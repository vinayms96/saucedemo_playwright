name: SauceDemo Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  normal-test:
    environment: prod
    env:
      SAUCE_DEMO_PASSWORD: ${{ secrets.SAUCE_DEMO_PASSWORD }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: normal-playwright-report
          path: playwright-report/
          retention-days: 30
  docker-test:
    environment: prod
    env:
      SAUCE_DEMO_PASSWORD: ${{ secrets.SAUCE_DEMO_PASSWORD }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker Image
        run: docker build -t saucedemo_playwright ./
      - name: Run Tests via Docker Container.
        run: docker run --rm -e SAUCE_DEMO_PASSWORD=$SAUCE_DEMO_PASSWORD -v ./docker-playwright-report/:/app/playwright-report saucedemo_playwright
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: docker-playwright-report
          path: docker-playwright-report/
          retention-days: 30
